<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        const handleWebSocketError = (event) => {
          try {
            const message = String(
              event.message || 
              (event.error && (event.error.message || event.error)) || 
              (event.reason && (event.reason.message || event.reason)) || 
              ''
            );
            const lowerMessage = message.toLowerCase();
            if (
              lowerMessage.includes('websocket') || 
              lowerMessage.includes('web socket') ||
              lowerMessage.includes('without opened') ||
              lowerMessage.includes('closeevent') ||
              lowerMessage.includes('ws://') ||
              lowerMessage.includes('wss://')
            ) {
              event.preventDefault();
              event.stopPropagation();
            }
          } catch (_) {}
        };
        window.addEventListener('unhandledrejection', handleWebSocketError, true);
        window.addEventListener('error', handleWebSocketError, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
